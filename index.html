<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ObnoxiouslyNoxious</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0d1117;
      color: #e6edf3;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .container {
      width: 100%;
      max-width: 480px;
    }

    .header {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    .avatar {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      border: 2px solid #30363d;
      display: block;
      margin: 0 auto 1rem;
      image-rendering: pixelated;
      object-fit: cover;
    }

    .header h1 {
      font-size: 1.25rem;
      font-weight: 600;
      color: #e6edf3;
      margin-bottom: 0.25rem;
    }

    .header p {
      font-size: 0.875rem;
      color: #8b949e;
      font-style: italic;
    }

    .links {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .link-card {
      display: flex;
      align-items: center;
      gap: 14px;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 12px;
      padding: 14px 18px;
      text-decoration: none;
      color: #e6edf3;
      transition: border-color 0.15s, background 0.15s;
    }

    .link-card:hover {
      border-color: #58a6ff;
      background: #1c2128;
    }

    .icon {
      width: 42px;
      height: 42px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: 1.25rem;
    }

    .icon-github  { background: #21262d; }
    .icon-map     { background: #0d2818; }
    .icon-calcoid { background: #1a1040; }
    .icon-steam   { background: #1b2838; }

    .card-text { flex: 1; }
    .card-label { font-size: 12px; color: #8b949e; margin-bottom: 2px; }
    .card-title { font-size: 15px; font-weight: 500; color: #e6edf3; }

    .arrow {
      color: #484f58;
      font-size: 18px;
      transition: color 0.15s, transform 0.15s;
    }

    .link-card:hover .arrow {
      color: #58a6ff;
      transform: translateX(3px);
    }

    footer {
      margin-top: 2.5rem;
      text-align: center;
      font-size: 12px;
      color: #484f58;
    }
  </style>
</head>
